name: MiniVisionary Healthcheck

on:
  push:
    branches: [ main ]
    # Avoid noisy runs on image-only or trivial changes
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'serve_spa.py'
      - 'backend/static/**'
      - '.github/workflows/healthcheck.yml'
  workflow_dispatch: {}
  # Once per day is enough; adjust if you want
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC daily

# Prevents a flood of overlapping runs
concurrency:
  group: healthcheck-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-auth-pages:
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://minivisionary.soulbridgeai.com
    steps:
      - name: Verify auth, terms, privacy and SPA fallback
        shell: bash
        run: |
          set -euo pipefail
          base="${BASE_URL%/}"

          fetch() {
            local path="$1"
            # robust curl: follow redirects, retry transient errors, bypass caches
            curl --fail --silent --show-error --location \
                 --retry 5 --retry-delay 3 \
                 -H "Cache-Control: no-cache" \
                 "$base$path"
          }

          lc() { tr '[:upper:]' '[:lower:]'; }

          assert_has() {
            local haystack="$1"; local needle="$2"
            if ! echo "$haystack" | lc | grep -q "$needle"; then
              echo "::error::Expected to find '$needle' in page"
              exit 1
            fi
          }

          assert_not_has() {
            local haystack="$1"; local needle="$2"
            if echo "$haystack" | lc | grep -q "$needle"; then
              echo "::error::Found forbidden string '$needle' in page"
              exit 1
            fi
          }

          echo "Checking /auth.html..."
          body=$(fetch /auth.html)
          assert_not_has "$body" 'id="root"'
          assert_not_has "$body" '<title>404 not found'
          assert_has "$body" 'mini visionary'

          echo "Checking /terms.html..."
          body=$(fetch /terms.html)
          assert_not_has "$body" 'id="root"'
          assert_not_has "$body" '<title>404 not found'
          assert_has "$body" 'terms'

          echo "Checking /privacy.html..."
          body=$(fetch /privacy.html)
          assert_not_has "$body" 'id="root"'
          assert_not_has "$body" '<title>404 not found'
          assert_has "$body" 'privacy'

          echo "Checking SPA fallback..."
          body=$(fetch /app/unknown/route)
          assert_has "$body" 'id="root"'

          echo "All health checks passed ✅"
